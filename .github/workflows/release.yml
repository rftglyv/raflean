name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write   # required for npm Trusted Publishing (OIDC)

jobs:
  build:
    name: build darwin-arm64
    runs-on: ubuntu-latest  # bun cross-compiles to darwin-arm64 from any host
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile || bun install

      - name: build raflean (plain CLI)
        run: bun build bin/raflean.js --compile --target=bun-darwin-arm64 --outfile raflean-darwin-arm64

      - name: build raflean-ui (Ink TUI)
        run: bun build bin/raflean-ui.js --compile --target=bun-darwin-arm64 --outfile raflean-ui-darwin-arm64

      - name: sha256
        run: |
          sha256sum raflean-darwin-arm64    > raflean-darwin-arm64.sha256
          sha256sum raflean-ui-darwin-arm64 > raflean-ui-darwin-arm64.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            raflean-darwin-arm64
            raflean-ui-darwin-arm64
            raflean-darwin-arm64.sha256
            raflean-ui-darwin-arm64.sha256
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-npm:
    name: publish to npm
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # Bun is needed because prepublishOnly → npm test → bun test
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 24 ships npm 11+, which is required for Trusted Publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile || bun install

      # No NPM_TOKEN — auth via OIDC Trusted Publishing.
      # Configure once at https://www.npmjs.com/package/raflean/access
      - name: npm publish (with provenance)
        run: npm publish --provenance --access public
